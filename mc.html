  gender:"", outerWear:"미착용", outerType:"", outerColor:"",
  shirtColor:"화이트", shirtLogo:"", tie:"미착용", tieColor:"", tiePattern:"",
  necklace:"미착용", brooch:"미착용", blush:false, lipDensity:"", lipColor:"",
  eyebrow:false, hairColor:"", hairFill:false, glasses:"미착용",
  glassesColor:"", glassesType:"", foreheadShow:false,
});

function Btn({ active, onClick, children }) {
  return (
    <button onClick={onClick} style={{
      padding:"4px 12px", borderRadius:999, fontSize:12, fontWeight:500,
      border: active ? "1px solid #b45309" : "1px solid rgba(255,255,255,0.2)",
      background: active ? "#b45309" : "rgba(255,255,255,0.08)",
      color: active ? "#fff" : "rgba(255,255,255,0.7)",
      cursor:"pointer", transition:"all .15s", margin:2
    }}>{children}</button>
  );
}

function Section({ title, icon, children }) {
  const [open, setOpen] = useState(true);
  return (
    <div style={{ border:"1px solid rgba(255,255,255,0.1)", borderRadius:16, overflow:"hidden", marginBottom:10 }}>
      <button onClick={() => setOpen(!open)} style={{
        width:"100%", display:"flex", justifyContent:"space-between", alignItems:"center",
        padding:"10px 16px", background:"rgba(255,255,255,0.04)", border:"none", cursor:"pointer"
      }}>
        <span style={{ color:"#fcd34d", fontSize:13, fontWeight:600 }}>{icon} {title}</span>
        <span style={{ color:"rgba(255,255,255,0.3)", fontSize:11 }}>{open?"▲":"▼"}</span>
      </button>
      {open && <div style={{ padding:"12px 16px" }}>{children}</div>}
    </div>
  );
}

function OptionRow({ label, children }) {
  return (
    <div style={{ marginBottom:10 }}>
      <p style={{ fontSize:11, color:"rgba(255,255,255,0.4)", marginBottom:6 }}>{label}</p>
      <div style={{ display:"flex", flexWrap:"wrap" }}>{children}</div>
    </div>
  );
}

function App() {
  const [authMode, setAuthMode] = useState("login");
  const [authForm, setAuthForm] = useState({ username:"", password:"", phone:"" });
  const [user, setUser]         = useState(null);
  const [authError, setAuthError] = useState("");
  const [authLoading, setAuthLoading] = useState(false);
  const [step, setStep]         = useState("upload");
  const [images, setImages]     = useState([]);
  const [opts, setOpts]         = useState(initOptions());
  const [resultImage, setResultImage] = useState(null);
  const [genError, setGenError] = useState("");
  const [genProgress, setGenProgress] = useState(0);
  const [progressLabel, setProgressLabel] = useState("");
  const [showPayment, setShowPayment] = useState(false);
  const [payLoading, setPayLoading] = useState(false);
  const [showDownload, setShowDownload] = useState(false);
  const [isAdmin, setIsAdmin]   = useState(false);
  const [adminData, setAdminData] = useState([]);
  const fileRef = useRef();

  const BG = "linear-gradient(135deg,#1a1008 0%,#2d1f0e 50%,#1a1008 100%)";

  // ── 헬퍼 ─────────────────────────────────────────────────────────────────
  const sbFetch = async (path, opts2={}) => {
    const token = user?.token || SUPABASE_KEY;
    const res = await fetch(`${SUPABASE_URL}${path}`, {
      ...opts2,
      headers: {
        "Content-Type":"application/json",
        "apikey": SUPABASE_KEY,
        "Authorization": `Bearer ${token}`,
        ...opts2.headers
      }
    });
    return res.json();
  };

  const sbAuth = async (path, body) => {
    const res = await fetch(`${SUPABASE_URL}/auth/v1${path}`, {
      method:"POST",
      headers:{ "Content-Type":"application/json", "apikey": SUPABASE_KEY },
      body: JSON.stringify(body)
    });
    return res.json();
  };

  const formatPhone = (val) => {
    const n = val.replace(/\D/g,"").slice(0,11);
    if(n.length<=3) return n;
    if(n.length<=7) return `${n.slice(0,3)}-${n.slice(3)}`;
    return `${n.slice(0,3)}-${n.slice(3,7)}-${n.slice(7)}`;
  };

  const toFakeEmail = (username) => {
    const encoded = Array.from(username.trim().toLowerCase())
      .map(c => c.charCodeAt(0).toString(36).padStart(4,"0")).join("");
    return `u${encoded}@jimong.com`;
  };

  // ── 인증 ─────────────────────────────────────────────────────────────────
  const handleAuth = async () => {
    setAuthError(""); setAuthLoading(true);
    try {
      if (authForm.username==="jimong" && authForm.password==="jm1995!") {
        const d = await loadAdminData();
        setIsAdmin(true); setAdminData(d); setAuthLoading(false); return;
      }
      if (!authForm.username.trim()) { setAuthError("아이디를 입력해주세요."); setAuthLoading(false); return; }
      if (authForm.username.length<2) { setAuthError("아이디는 2자 이상 입력해주세요."); setAuthLoading(false); return; }

      const fakeEmail = toFakeEmail(authForm.username);

      if (authMode==="register") {
        const rawPhone = authForm.phone.replace(/\D/g,"");
        if (rawPhone.length!==11) { setAuthError("전화번호 11자리를 정확히 입력해주세요."); setAuthLoading(false); return; }

        const data = await sbAuth("/signup", { email: fakeEmail, password: authForm.password });
        if (data.error) {
          setAuthError(data.error.message.includes("already registered")
            ? "이미 사용 중인 아이디입니다." : data.error.message);
          setAuthLoading(false); return;
        }
        if (!data.user) { setAuthError("가입 오류: " + JSON.stringify(data).slice(0,80)); setAuthLoading(false); return; }

        await fetch(`${SUPABASE_URL}/rest/v1/profiles?id=eq.${data.user.id}`, {
          method:"PATCH",
          headers:{ "Content-Type":"application/json","apikey":SUPABASE_KEY,"Authorization":`Bearer ${data.access_token||SUPABASE_KEY}`,"Prefer":"return=minimal" },
          body: JSON.stringify({ username: authForm.username.trim(), phone: authForm.phone })
        });

        setAuthError("✅ 가입 완료! 로그인해주세요.");
        setAuthMode("login");
        setAuthForm(p=>({...p, phone:""}));
      } else {
        const data = await sbAuth("/token?grant_type=password", { email: fakeEmail, password: authForm.password });
        if (data.error) { setAuthError("아이디 또는 비밀번호가 올바르지 않습니다."); setAuthLoading(false); return; }

        const token = data.access_token;
        const profiles = await fetch(`${SUPABASE_URL}/rest/v1/profiles?id=eq.${data.user.id}&select=*`, {
          headers:{ "apikey":SUPABASE_KEY, "Authorization":`Bearer ${token}` }
        }).then(r=>r.json());
        const profile = profiles[0];

        if (profile?.is_blocked) { setAuthError("차단된 계정입니다. 운영자에게 문의하세요."); setAuthLoading(false); return; }

        const gens = await fetch(`${SUPABASE_URL}/rest/v1/generations?user_id=eq.${data.user.id}&select=id`, {
          headers:{ "apikey":SUPABASE_KEY, "Authorization":`Bearer ${token}` }
        }).then(r=>r.json());

        setUser({ id: data.user.id, username: authForm.username.trim(), token, credits: profile?.credits??2, total_paid: profile?.total_paid??0, generation_count: gens.length });
      }
    } catch(e) { setAuthError("오류: " + (e?.message||String(e))); }
    setAuthLoading(false);
  };

  // ── 운영자 ───────────────────────────────────────────────────────────────
  const loadAdminData = async () => {
    try {
      const profiles = await fetch(`${SUPABASE_URL}/rest/v1/profiles?select=id,email,username,phone,is_blocked,credits,total_paid,created_at`, {
        headers:{ "apikey":SUPABASE_KEY, "Authorization":`Bearer ${SUPABASE_KEY}` }
      }).then(r=>r.json());
      const enriched = await Promise.all(profiles.map(async p => {
        const gens = await fetch(`${SUPABASE_URL}/rest/v1/generations?user_id=eq.${p.id}&select=id`, {
          headers:{ "apikey":SUPABASE_KEY, "Authorization":`Bearer ${SUPABASE_KEY}` }
        }).then(r=>r.json());
        return {...p, generation_count: gens.length};
      }));
      return enriched;
    } catch { return []; }
  };

  const toggleBlock = async (userId, cur) => {
    await fetch(`${SUPABASE_URL}/rest/v1/profiles?id=eq.${userId}`, {
      method:"PATCH",
      headers:{ "Content-Type":"application/json","apikey":SUPABASE_KEY,"Authorization":`Bearer ${SUPABASE_KEY}`,"Prefer":"return=minimal" },
      body: JSON.stringify({ is_blocked: !cur })
    });
    const d = await loadAdminData(); setAdminData(d);
  };

  // ── 이미지 업로드 ─────────────────────────────────────────────────────────
  const handleFiles = (files) => {
    const arr = Array.from(files).slice(0, 5-images.length);
    const newImgs = arr.map(f=>({ file:f, url:URL.createObjectURL(f) }));
    setImages(prev=>[...prev,...newImgs].slice(0,5));
  };

  // ── 옵션 ─────────────────────────────────────────────────────────────────
  const setOpt = (key,val) => setOpts(p=>({...p,[key]:val}));
  const toggleOpt = (key) => setOpts(p=>({...p,[key]:!p[key]}));

  // ── 프롬프트 ─────────────────────────────────────────────────────────────
  const buildPrompt = () => {
    const g = opts.gender==="남성"?"남성":"여성";
    let p = `이 ${g} 인물 사진을 전문 증명사진 스튜디오에서 촬영한 것처럼 자연스럽게 보정해주세요.\n\n[필수 조건]\n- 인물의 얼굴 생김새, 이목구비를 동일하게 유지\n- 정면을 바라보는 바른 자세\n- 입술을 다문 상태, 이가 보이지 않음\n- 아주 살짝 밝은 자연스러운 미소\n- 편집이 과하지 않고 자연스럽게\n- 워터마크 없음\n\n[의상]\n- 셔츠 색깔: ${opts.shirtColor}`;
    if(opts.outerWear==="착용"&&opts.outerType) p+=`\n- 아우터: ${opts.outerType} (${opts.outerColor||"블랙"})`;
    else if(opts.shirtLogo) p+=`\n- 셔츠 가슴 로고: ${opts.shirtLogo}`;
    if(g==="남성"&&opts.tie==="착용") p+=`\n- 넥타이: ${opts.tieColor||"네이비"} ${opts.tiePattern||"단색"}`;
    if(g==="여성"){
      if(opts.necklace!=="미착용") p+=`\n- 목걸이: ${opts.necklace}`;
      if(opts.brooch!=="미착용") p+=`\n- 브로치: ${opts.brooch}`;
    }
    p+=`\n\n[헤어 & 메이크업]`;
    if(opts.hairColor) p+=`\n- 머리 염색: ${opts.hairColor}`;
    if(opts.hairFill) p+=`\n- 탈모 부위를 자연스럽게 채워주세요`;
    if(opts.foreheadShow) p+=`\n- 이마가 잘 보이도록 헤어스타일 정리`;
    if(opts.eyebrow) p+=`\n- 눈썹을 자연스럽게 정돈`;
    if(opts.blush) p+=`\n- 볼터치: 아주 살짝 분홍빛`;
    if(opts.lipColor) p+=`\n- 립: ${opts.lipDensity||"보통"} 농도의 ${opts.lipColor}`;
    if(opts.glasses==="착용"&&opts.glassesType) p+=`\n\n[안경]\n- ${opts.glassesColor||"블랙"} ${opts.glassesType} 착용`;
    p+=`\n\n전문 사진관의 증명사진처럼 깔끔하고 자연스럽게 완성해주세요.`;
    return p;
  };

  // ── 이미지 생성 ───────────────────────────────────────────────────────────
  const generateImage = async () => {
    if(user.credits<1){ setShowPayment(true); return; }
    setStep("generating"); setGenError(""); setGenProgress(0);
    const steps=[
      {label:"사진 분석 중...",pct:15},{label:"의상 적용 중...",pct:35},
      {label:"메이크업 보정 중...",pct:55},{label:"표정 & 자세 조정 중...",pct:75},{label:"최종 보정 중...",pct:90}
    ];
    let idx=0;
    const timer=setInterval(()=>{ if(idx<steps.length){ setProgressLabel(steps[idx].label); setGenProgress(steps[idx].pct); idx++; } },2000);
    try {
      const toB64=(file)=>new Promise((res,rej)=>{ const r=new FileReader(); r.onload=()=>res(r.result.split(",")[1]); r.onerror=rej; r.readAsDataURL(file); });
      const imgParts=await Promise.all(images.map(async img=>({ inlineData:{ mimeType:img.file.type, data:await toB64(img.file) } })));
      const response=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash-preview-image-generation:generateContent?key=${GEMINI_KEY}`,{
        method:"POST", headers:{"Content-Type":"application/json"},
        body:JSON.stringify({ contents:[{parts:[...imgParts,{text:buildPrompt()}]}], generationConfig:{responseModalities:["TEXT","IMAGE"]} })
      });
      const data=await response.json();
      if(data.error) throw new Error(data.error.message);
      const imagePart=data.candidates?.[0]?.content?.parts?.find(p=>p.inlineData);
      if(!imagePart) throw new Error("이미지 생성에 실패했습니다. 다시 시도해주세요.");
      setResultImage(`data:${imagePart.inlineData.mimeType};base64,${imagePart.inlineData.data}`);

      await fetch(`${SUPABASE_URL}/rest/v1/profiles?id=eq.${user.id}`,{
        method:"PATCH", headers:{"Content-Type":"application/json","apikey":SUPABASE_KEY,"Authorization":`Bearer ${user.token}`,"Prefer":"return=minimal"},
        body:JSON.stringify({credits:user.credits-1})
      });
      await fetch(`${SUPABASE_URL}/rest/v1/generations`,{
        method:"POST", headers:{"Content-Type":"application/json","apikey":SUPABASE_KEY,"Authorization":`Bearer ${user.token}`,"Prefer":"return=minimal"},
        body:JSON.stringify({user_id:user.id})
      });
      setUser(p=>({...p,credits:p.credits-1,generation_count:p.generation_count+1}));
      clearInterval(timer); setGenProgress(100); setProgressLabel("완료!");
      setTimeout(()=>setStep("result"),500);
    } catch(e) { clearInterval(timer); setGenError(e.message||"오류가 발생했습니다."); setStep("options"); }
  };

  // ── 다운로드 ─────────────────────────────────────────────────────────────
  const handleDownload=(type)=>{ if(!resultImage)return; const a=document.createElement("a"); a.href=resultImage; a.download=`지몽사진관_${type.label}_${Date.now()}.jpg`; a.click(); setShowDownload(false); };

  // ── 요약 패널 ────────────────────────────────────────────────────────────
  const Summary = () => {
    const items=[];
    if(opts.gender) items.push(`성별: ${opts.gender}`);
    if(opts.outerWear==="착용"&&opts.outerType) items.push(`아우터: ${opts.outerType}(${opts.outerColor})`);
    if(opts.shirtColor) items.push(`셔츠: ${opts.shirtColor}`);
    if(opts.shirtLogo&&opts.outerWear!=="착용") items.push(`로고: ${opts.shirtLogo}`);
    if(opts.tie==="착용") items.push(`넥타이: ${opts.tieColor} ${opts.tiePattern}`);
    if(opts.necklace!=="미착용") items.push(`목걸이: ${opts.necklace}`);
    if(opts.brooch!=="미착용") items.push(`브로치: ${opts.brooch}`);
    if(opts.blush) items.push("볼터치 ✓");
    if(opts.lipColor) items.push(`립: ${opts.lipDensity} ${opts.lipColor}`);
    if(opts.eyebrow) items.push("눈썹 ✓");
    if(opts.hairColor) items.push(`염색: ${opts.hairColor}`);
    if(opts.hairFill) items.push("머리숱 ✓");
    if(opts.glasses==="착용") items.push(`안경: ${opts.glassesColor} ${opts.glassesType}`);
    if(opts.foreheadShow) items.push("이마 ✓");
    return (
      <div style={{ background:"rgba(255,255,255,0.04)", borderRadius:12, padding:12, border:"1px solid rgba(255,255,255,0.1)" }}>
        <p style={{ fontSize:11, color:"#fcd34d", fontWeight:600, marginBottom:8 }}>📋 선택 요약</p>
        {items.length===0
          ? <p style={{ fontSize:11, color:"rgba(255,255,255,0.3)" }}>아직 선택된 항목이 없습니다</p>
          : <div style={{ display:"flex", flexWrap:"wrap", gap:4 }}>
              {items.map((it,i)=><span key={i} style={{ fontSize:11, background:"rgba(180,83,9,0.3)", color:"#fde68a", padding:"2px 8px", borderRadius:999 }}>{it}</span>)}
            </div>
        }
      </div>
    );
  };

  const inputStyle = { width:"100%", background:"rgba(255,255,255,0.08)", border:"1px solid rgba(255,255,255,0.2)", borderRadius:12, padding:"10px 14px", color:"#fff", fontSize:14, outline:"none" };
  const btnPrimary = { width:"100%", padding:"12px", borderRadius:12, background:"#b45309", border:"none", color:"#fff", fontSize:14, fontWeight:600, cursor:"pointer" };

  // ══════════════════════════════════════════════════════════════════════════
  // 운영자 대시보드
  // ══════════════════════════════════════════════════════════════════════════
  if (isAdmin) return (
    <div style={{ minHeight:"100vh", padding:24, background:BG }}>
      <div style={{ maxWidth:900, margin:"0 auto" }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:24 }}>
          <div>
            <h1 style={{ color:"#fcd34d", fontSize:22, fontWeight:700, fontFamily:"Georgia,serif", margin:0 }}>지몽 사진관</h1>
            <p style={{ color:"rgba(255,255,255,0.4)", fontSize:11, margin:0 }}>운영자 대시보드</p>
          </div>
          <button onClick={()=>setIsAdmin(false)} style={{ fontSize:11, color:"rgba(255,255,255,0.4)", border:"1px solid rgba(255,255,255,0.1)", padding:"6px 14px", borderRadius:999, background:"transparent", cursor:"pointer" }}>로그아웃</button>
        </div>

        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:16, marginBottom:24 }}>
          {[
            {label:"총 회원", value: adminData.length},
            {label:"총 제작", value: adminData.reduce((s,u)=>s+(u.generation_count||0),0)},
            {label:"총 결제", value:`₩${adminData.reduce((s,u)=>s+(u.total_paid||0),0).toLocaleString()}`},
          ].map(c=>(
            <div key={c.label} style={{ background:"rgba(255,255,255,0.04)", border:"1px solid rgba(255,255,255,0.1)", borderRadius:16, padding:16, textAlign:"center" }}>
              <p style={{ color:"#fcd34d", fontSize:24, fontWeight:700, margin:0 }}>{c.value}</p>
              <p style={{ color:"rgba(255,255,255,0.4)", fontSize:11, marginTop:4 }}>{c.label}</p>
            </div>
          ))}
        </div>

        <div style={{ background:"rgba(255,255,255,0.04)", border:"1px solid rgba(255,255,255,0.1)", borderRadius:16, overflow:"hidden" }}>
          <div style={{ padding:"12px 16px", borderBottom:"1px solid rgba(255,255,255,0.1)" }}>
            <p style={{ color:"#fcd34d", fontSize:13, fontWeight:600, margin:0 }}>회원 목록</p>
          </div>
          <div style={{ overflowX:"auto" }}>
            <table style={{ width:"100%", borderCollapse:"collapse", fontSize:12, color:"rgba(255,255,255,0.7)" }}>
              <thead>
                <tr style={{ borderBottom:"1px solid rgba(255,255,255,0.1)", color:"rgba(255,255,255,0.4)" }}>
                  {["아이디","전화번호","크레딧","제작횟수","결제금액","가입일","상태"].map(h=>(
                    <th key={h} style={{ padding:"8px 16px", textAlign: h==="아이디"||h==="전화번호"?"left":"center" }}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {adminData.length===0
                  ? <tr><td colSpan={7} style={{ textAlign:"center", padding:32, color:"rgba(255,255,255,0.3)" }}>회원이 없습니다</td></tr>
                  : adminData.map(u=>(
                    <tr key={u.id} style={{ borderBottom:"1px solid rgba(255,255,255,0.05)" }}>
                      <td style={{ padding:"8px 16px" }}>{u.username||"-"}</td>
                      <td style={{ padding:"8px 16px" }}>{u.phone||"-"}</td>
                      <td style={{ padding:"8px 16px", textAlign:"center" }}>{u.credits}</td>
                      <td style={{ padding:"8px 16px", textAlign:"center" }}>{u.generation_count||0}</td>
                      <td style={{ padding:"8px 16px", textAlign:"center" }}>₩{(u.total_paid||0).toLocaleString()}</td>
                      <td style={{ padding:"8px 16px", textAlign:"center" }}>{u.created_at?.slice(0,10)}</td>
                      <td style={{ padding:"8px 16px", textAlign:"center" }}>
                        <button onClick={()=>toggleBlock(u.id,u.is_blocked)} style={{
                          padding:"3px 10px", borderRadius:999, fontSize:11, fontWeight:500, border:"none", cursor:"pointer",
                          background: u.is_blocked?"rgba(239,68,68,0.2)":"rgba(34,197,94,0.2)",
                          color: u.is_blocked?"#f87171":"#4ade80"
                        }}>{u.is_blocked?"차단됨":"정상"}</button>
                      </td>
                    </tr>
                  ))
                }
              </tbody>
            </table>
          </div>
        </div>
        <button onClick={async()=>{ const d=await loadAdminData(); setAdminData(d); }} style={{ marginTop:12, fontSize:12, color:"#fbbf24", background:"none", border:"none", cursor:"pointer" }}>↻ 새로고침</button>
      </div>
    </div>
  );

  // ══════════════════════════════════════════════════════════════════════════
  // 로그인 / 회원가입
  // ══════════════════════════════════════════════════════════════════════════
  if (!user) return (
    <div style={{ minHeight:"100vh", display:"flex", alignItems:"center", justifyContent:"center", padding:24, background:BG }}>
      <div style={{ width:"100%", maxWidth:360 }}>
        <div style={{ textAlign:"center", marginBottom:32 }}>
          <div style={{ fontSize:48, marginBottom:12 }}>📷</div>
          <h1 style={{ color:"#fcd34d", fontSize:28, fontWeight:700, fontFamily:"Georgia,serif", margin:0 }}>지몽 사진관</h1>
          <p style={{ color:"rgba(255,255,255,0.4)", fontSize:13, marginTop:4 }}>AI 증명사진 보정 서비스</p>
        </div>

        <div style={{ background:"rgba(255,255,255,0.04)", border:"1px solid rgba(255,255,255,0.1)", borderRadius:20, padding:24 }}>
          <div style={{ display:"flex", borderRadius:12, overflow:"hidden", border:"1px solid rgba(255,255,255,0.1)", marginBottom:20 }}>
            {["login","register"].map(m=>(
              <button key={m} onClick={()=>setAuthMode(m)} style={{
                flex:1, padding:"8px 0", fontSize:13, fontWeight:500, border:"none", cursor:"pointer",
                background: authMode===m?"#b45309":"transparent",
                color: authMode===m?"#fff":"rgba(255,255,255,0.4)"
              }}>{m==="login"?"로그인":"회원가입"}</button>
            ))}
          </div>

          <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
            <input style={inputStyle} type="text" placeholder="아이디 (예: 김철수, hong123)"
              value={authForm.username} onChange={e=>setAuthForm(p=>({...p,username:e.target.value}))}/>
            <input style={inputStyle} type="password" placeholder="비밀번호 (6자리 이상)"
              value={authForm.password} onChange={e=>setAuthForm(p=>({...p,password:e.target.value}))}
              onKeyDown={e=>e.key==="Enter"&&handleAuth()}/>
            {authMode==="register" && (
              <input style={inputStyle} type="tel" placeholder="전화번호 11자리 (예: 010-1234-5678)"
                value={authForm.phone} onChange={e=>setAuthForm(p=>({...p,phone:formatPhone(e.target.value)}))}/>
            )}
          </div>

          {authError && <p style={{ fontSize:12, marginTop:8, color: authError.startsWith("✅")?"#4ade80":"#f87171" }}>{authError}</p>}

          <button onClick={handleAuth} disabled={authLoading} style={{ ...btnPrimary, marginTop:16, opacity:authLoading?0.5:1 }}>
            {authLoading?"처리 중...": authMode==="login"?"로그인":"회원가입"}
          </button>
          {authMode==="register"&&<p style={{ fontSize:11, color:"rgba(255,255,255,0.3)", textAlign:"center", marginTop:10 }}>가입 즉시 2크레딧이 지급됩니다 🎁</p>}
        </div>
      </div>
    </div>
  );

  // ══════════════════════════════════════════════════════════════════════════
  // 생성 중
  // ══════════════════════════════════════════════════════════════════════════
  if (step==="generating") return (
    <div style={{ minHeight:"100vh", display:"flex", alignItems:"center", justifyContent:"center", background:BG }}>
      <div style={{ textAlign:"center", maxWidth:360, width:"100%", padding:24 }}>
        <div style={{ fontSize:48, marginBottom:16 }}>📷</div>
        <h2 style={{ color:"#fcd34d", fontSize:20, fontWeight:700 }}>사진 제작 중</h2>
        <p style={{ color:"rgba(255,255,255,0.5)", fontSize:13, marginBottom:24 }}>{progressLabel}</p>
        <div style={{ width:"100%", background:"rgba(255,255,255,0.1)", borderRadius:999, height:8, marginBottom:8 }}>
          <div style={{ height:8, borderRadius:999, background:"linear-gradient(90deg,#b45309,#f59e0b)", width:`${genProgress}%`, transition:"width .7s" }}/>
        </div>
        <p style={{ fontSize:11, color:"rgba(255,255,255,0.3)" }}>{genProgress}%</p>
      </div>
    </div>
  );

  // ══════════════════════════════════════════════════════════════════════════
  // 결과
  // ══════════════════════════════════════════════════════════════════════════
  if (step==="result") return (
    <div style={{ minHeight:"100vh", padding:24, background:BG }}>
      <div style={{ maxWidth:520, margin:"0 auto" }}>
        <div style={{ textAlign:"center", marginBottom:24 }}>
          <h1 style={{ color:"#fcd34d", fontSize:22, fontWeight:700, fontFamily:"Georgia,serif", margin:0 }}>지몽 사진관</h1>
          <p style={{ color:"rgba(255,255,255,0.4)", fontSize:11, margin:0 }}>제작 완료</p>
        </div>
        <div style={{ position:"relative", borderRadius:16, overflow:"hidden", border:"1px solid rgba(255,255,255,0.1)", height:400, marginBottom:16 }}>
          <img src={resultImage} alt="결과" style={{ position:"absolute", inset:0, width:"100%", height:"100%", objectFit:"cover" }}/>
          {images[0]&&(
            <div style={{ position:"absolute", inset:0, display:"flex" }}>
              <div style={{ width:"50%", overflow:"hidden", borderRight:"2px solid #fbbf24" }}>
                <img src={images[0].url} alt="원본" style={{ width:"200%", height:"100%", objectFit:"cover" }}/>
              </div>
            </div>
          )}
          <div style={{ position:"absolute", bottom:12, left:12, fontSize:11, background:"rgba(0,0,0,0.6)", color:"rgba(255,255,255,0.7)", padding:"2px 8px", borderRadius:999 }}>원본</div>
          <div style={{ position:"absolute", bottom:12, right:12, fontSize:11, background:"rgba(180,83,9,0.8)", color:"#fff", padding:"2px 8px", borderRadius:999 }}>보정</div>
        </div>
        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:10, marginBottom:16 }}>
          {[
            {label:"🔄 다시 제작", onClick:()=>{setStep("generating");generateImage();}},
            {label:"✏️ 항목 변경", onClick:()=>{setStep("upload");setImages([]);setOpts(initOptions());setResultImage(null);}},
            {label:"⬇️ 다운로드", onClick:()=>setShowDownload(true), primary:true},
          ].map(b=>(
            <button key={b.label} onClick={b.onClick} style={{ padding:"10px 0", borderRadius:12, fontSize:13, fontWeight:b.primary?600:500, border:"1px solid rgba(255,255,255,0.1)", background:b.primary?"#b45309":"rgba(255,255,255,0.08)", color:"#fff", cursor:"pointer" }}>{b.label}</button>
          ))}
        </div>
        <div style={{ display:"flex", justifyContent:"space-between", fontSize:11, color:"rgba(255,255,255,0.3)", padding:"0 4px" }}>
          <span>잔여 크레딧: <span style={{ color:"#fbbf24", fontWeight:700 }}>{user.credits}</span></span>
          <button onClick={()=>setShowPayment(true)} style={{ color:"#fbbf24", background:"none", border:"none", cursor:"pointer", fontSize:11 }}>충전하기 →</button>
        </div>
      </div>

      {showDownload&&(
        <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.7)", display:"flex", alignItems:"center", justifyContent:"center", padding:16, zIndex:50 }}>
          <div style={{ background:"#2d1f0e", border:"1px solid rgba(255,255,255,0.1)", borderRadius:20, padding:24, width:"100%", maxWidth:360 }}>
            <h3 style={{ color:"#fcd34d", fontWeight:600, marginTop:0 }}>📥 다운로드 종류 선택</h3>
            <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
              {DOWNLOAD_TYPES.map(t=>(
                <button key={t.id} onClick={()=>handleDownload(t)} style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"10px 16px", borderRadius:12, background:"rgba(255,255,255,0.04)", border:"1px solid rgba(255,255,255,0.1)", color:"#fff", cursor:"pointer", fontSize:13 }}>
                  <span>{t.label}</span><span style={{ fontSize:11, color:"rgba(255,255,255,0.4)" }}>{t.size} ({t.px}px)</span>
                </button>
              ))}
            </div>
            <button onClick={()=>setShowDownload(false)} style={{ width:"100%", marginTop:10, padding:"8px 0", background:"none", border:"none", color:"rgba(255,255,255,0.4)", cursor:"pointer", fontSize:13 }}>취소</button>
          </div>
        </div>
      )}

      {showPayment&&(
        <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.7)", display:"flex", alignItems:"center", justifyContent:"center", padding:16, zIndex:50 }}>
          <div style={{ background:"#2d1f0e", border:"1px solid rgba(255,255,255,0.1)", borderRadius:20, padding:24, width:"100%", maxWidth:360 }}>
            <h3 style={{ color:"#fcd34d", fontWeight:600, marginTop:0 }}>💳 크레딧 충전</h3>
            <p style={{ color:"rgba(255,255,255,0.4)", fontSize:11, marginTop:-8 }}>잔여 크레딧: {user.credits}</p>
            <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
              {PACKAGES.map(pkg=>(
                <button key={pkg.id} onClick={()=>alert("토스페이먼츠 클라이언트 키 설정 후 이용 가능합니다.")} disabled={payLoading} style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"12px 16px", borderRadius:12, background:"rgba(255,255,255,0.04)", border:"1px solid rgba(255,255,255,0.1)", color:"#fff", cursor:"pointer" }}>
                  <div style={{ textAlign:"left" }}>
                    <p style={{ margin:0, fontWeight:500 }}>{pkg.label}</p>
                    <p style={{ margin:0, fontSize:11, color:"rgba(255,255,255,0.4)" }}>+{pkg.credits} 크레딧</p>
                  </div>
                  <span style={{ color:"#fcd34d", fontWeight:600 }}>₩{pkg.price.toLocaleString()}</span>
                </button>
              ))}
            </div>
            <button onClick={()=>setShowPayment(false)} style={{ width:"100%", marginTop:10, padding:"8px 0", background:"none", border:"none", color:"rgba(255,255,255,0.4)", cursor:"pointer", fontSize:13 }}>취소</button>
          </div>
        </div>
      )}
    </div>
  );

  // ══════════════════════════════════════════════════════════════════════════
  // 업로드
  // ══════════════════════════════════════════════════════════════════════════
  if (step==="upload") return (
    <div style={{ minHeight:"100vh", padding:24, background:BG }}>
      <div style={{ maxWidth:520, margin:"0 auto" }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:24 }}>
          <div>
            <h1 style={{ color:"#fcd34d", fontSize:22, fontWeight:700, fontFamily:"Georgia,serif", margin:0 }}>지몽 사진관</h1>
            <p style={{ color:"rgba(255,255,255,0.4)", fontSize:11, margin:0 }}>AI 증명사진 보정</p>
          </div>
          <div style={{ textAlign:"right" }}>
            <p style={{ color:"rgba(255,255,255,0.4)", fontSize:11, margin:0 }}>{user.username}</p>
            <p style={{ color:"#fbbf24", fontSize:11, margin:0 }}>크레딧 <b>{user.credits}</b></p>
          </div>
        </div>

        <div onClick={()=>images.length<5&&fileRef.current?.click()}
          onDrop={e=>{e.preventDefault();handleFiles(e.dataTransfer.files);}}
          onDragOver={e=>e.preventDefault()}
          style={{ border:"2px dashed rgba(180,83,9,0.4)", borderRadius:16, padding:40, textAlign:"center", cursor:"pointer", marginBottom:16 }}>
          <input ref={fileRef} type="file" accept="image/*" multiple style={{ display:"none" }} onChange={e=>handleFiles(e.target.files)}/>
          <div style={{ fontSize:40, marginBottom:10 }}>📸</div>
          <p style={{ color:"rgba(255,255,255,0.6)", fontSize:13, margin:0 }}>사진을 드래그하거나 클릭해서 업로드</p>
          <p style={{ color:"rgba(255,255,255,0.3)", fontSize:11, marginTop:4 }}>최소 1장 ~ 최대 5장 (여러 각도 권장)</p>
        </div>

        {images.length>0&&(
          <div style={{ display:"flex", gap:8, marginBottom:16, flexWrap:"wrap" }}>
            {images.map((img,i)=>(
              <div key={i} style={{ position:"relative", width:64, height:64, borderRadius:12, overflow:"hidden", border:"1px solid rgba(255,255,255,0.2)" }}>
                <img src={img.url} alt="" style={{ width:"100%", height:"100%", objectFit:"cover" }}/>
                <button onClick={()=>setImages(p=>p.filter((_,idx)=>idx!==i))} style={{ position:"absolute", inset:0, background:"rgba(0,0,0,0.6)", color:"#fff", fontSize:18, border:"none", cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center" }}>×</button>
              </div>
            ))}
          </div>
        )}

        {images.length>0&&(
          <button onClick={()=>setStep("options")} style={btnPrimary}>다음 단계 →</button>
        )}

        <div style={{ display:"flex", justifyContent:"space-between", marginTop:16, fontSize:11, color:"rgba(255,255,255,0.2)", padding:"0 4px" }}>
          <button onClick={()=>setShowPayment(true)} style={{ background:"none", border:"none", color:"rgba(255,255,255,0.2)", cursor:"pointer", fontSize:11 }}>💳 크레딧 충전</button>
          <button onClick={()=>{setUser(null);setImages([]);setOpts(initOptions());}} style={{ background:"none", border:"none", color:"rgba(255,255,255,0.2)", cursor:"pointer", fontSize:11 }}>로그아웃</button>
        </div>
      </div>

      {showPayment&&(
        <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.7)", display:"flex", alignItems:"center", justifyContent:"center", padding:16, zIndex:50 }}>
          <div style={{ background:"#2d1f0e", border:"1px solid rgba(255,255,255,0.1)", borderRadius:20, padding:24, width:"100%", maxWidth:360 }}>
            <h3 style={{ color:"#fcd34d", fontWeight:600, marginTop:0 }}>💳 크레딧 충전</h3>
            <p style={{ color:"rgba(255,255,255,0.4)", fontSize:11, marginTop:-8 }}>잔여 크레딧: {user.credits}</p>
            <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
              {PACKAGES.map(pkg=>(
                <button key={pkg.id} onClick={()=>alert("토스페이먼츠 연동 후 이용 가능합니다.")} style={{ display:"flex", justifyContent:"space-between", padding:"12px 16px", borderRadius:12, background:"rgba(255,255,255,0.04)", border:"1px solid rgba(255,255,255,0.1)", color:"#fff", cursor:"pointer" }}>
                  <div><p style={{ margin:0, fontWeight:500 }}>{pkg.label}</p><p style={{ margin:0, fontSize:11, color:"rgba(255,255,255,0.4)" }}>+{pkg.credits} 크레딧</p></div>
                  <span style={{ color:"#fcd34d", fontWeight:600 }}>₩{pkg.price.toLocaleString()}</span>
                </button>
              ))}
            </div>
            <button onClick={()=>setShowPayment(false)} style={{ width:"100%", marginTop:10, padding:"8px 0", background:"none", border:"none", color:"rgba(255,255,255,0.4)", cursor:"pointer" }}>취소</button>
          </div>
        </div>
      )}
    </div>
  );

  // ══════════════════════════════════════════════════════════════════════════
  // 옵션
  // ══════════════════════════════════════════════════════════════════════════
  return (
    <div style={{ minHeight:"100vh", padding:16, background:BG }}>
      <div style={{ maxWidth:800, margin:"0 auto" }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:16 }}>
          <h1 style={{ color:"#fcd34d", fontSize:18, fontWeight:700, fontFamily:"Georgia,serif", margin:0 }}>지몽 사진관</h1>
          <div style={{ display:"flex", alignItems:"center", gap:12, fontSize:12 }}>
            <span style={{ color:"#fbbf24" }}>크레딧 <b>{user.credits}</b></span>
            <button onClick={()=>setStep("upload")} style={{ color:"rgba(255,255,255,0.4)", border:"1px solid rgba(255,255,255,0.1)", padding:"4px 10px", borderRadius:999, background:"transparent", cursor:"pointer", fontSize:11 }}>← 뒤로</button>
          </div>
        </div>

        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:16 }}>
          <div>
            <div style={{ borderRadius:16, overflow:"hidden", border:"1px solid rgba(255,255,255,0.1)", aspectRatio:"3/4", background:"rgba(0,0,0,0.3)", position:"relative", marginBottom:12 }}>
              {images[0]&&<img src={images[0].url} alt="" style={{ width:"100%", height:"100%", objectFit:"cover" }}/>}
              <div style={{ position:"absolute", top:8, right:8, fontSize:10, background:"rgba(0,0,0,0.6)", color:"rgba(255,255,255,0.6)", padding:"2px 8px", borderRadius:999 }}>원본</div>
            </div>
            <Summary/>
          </div>

          <div style={{ overflowY:"auto", maxHeight:"80vh" }}>
            <Section title="성별" icon="👤">
              <OptionRow label="성별 선택">
                {["남성","여성"].map(g=><Btn key={g} active={opts.gender===g} onClick={()=>setOpt("gender",g)}>{g}</Btn>)}
              </OptionRow>
            </Section>
            <Section title="아우터" icon="🧥">
              <OptionRow label="착용 여부">
                {["착용","미착용"].map(v=><Btn key={v} active={opts.outerWear===v} onClick={()=>setOpt("outerWear",v)}>{v}</Btn>)}
              </OptionRow>
              {opts.outerWear==="착용"&&<>
                <OptionRow label="종류">{OUTER_TYPES.map(v=><Btn key={v} active={opts.outerType===v} onClick={()=>setOpt("outerType",v)}>{v}</Btn>)}</OptionRow>
                <OptionRow label="색깔">{OUTER_COLORS.map(v=><Btn key={v} active={opts.outerColor===v} onClick={()=>setOpt("outerColor",v)}>{v}</Btn>)}</OptionRow>
              </>}
            </Section>
            <Section title="셔츠" icon="👔">
              <OptionRow label="색깔">{SHIRT_COLORS.map(v=><Btn key={v} active={opts.shirtColor===v} onClick={()=>setOpt("shirtColor",v)}>{v}</Btn>)}</OptionRow>
              {opts.outerWear!=="착용"&&<OptionRow label="가슴 로고">{SHIRT_LOGOS.map(v=><Btn key={v} active={opts.shirtLogo===v} onClick={()=>setOpt("shirtLogo",opts.shirtLogo===v?"":v)}>{v}</Btn>)}</OptionRow>}
            </Section>
            {(opts.gender==="남성"||!opts.gender)&&(
              <Section title="넥타이 (남성)" icon="👔">
                <OptionRow label="착용 여부">{["착용","미착용"].map(v=><Btn key={v} active={opts.tie===v} onClick={()=>setOpt("tie",v)}>{v}</Btn>)}</OptionRow>
                {opts.tie==="착용"&&<>
                  <OptionRow label="색깔">{TIE_COLORS.map(v=><Btn key={v} active={opts.tieColor===v} onClick={()=>setOpt("tieColor",v)}>{v}</Btn>)}</OptionRow>
                  <OptionRow label="패턴">{TIE_PATTERNS.map(v=><Btn key={v} active={opts.tiePattern===v} onClick={()=>setOpt("tiePattern",v)}>{v}</Btn>)}</OptionRow>
                </>}
              </Section>
            )}
            {opts.gender==="여성"&&(
              <Section title="액세서리 (여성)" icon="💎">
                <OptionRow label="목걸이">{NECKLACE_TYPES.map(v=><Btn key={v} active={opts.necklace===v} onClick={()=>setOpt("necklace",v)}>{v}</Btn>)}</OptionRow>
                <OptionRow label="브로치">{BROOCH_TYPES.map(v=><Btn key={v} active={opts.brooch===v} onClick={()=>setOpt("brooch",v)}>{v}</Btn>)}</OptionRow>
              </Section>
            )}
            <Section title="헤어 & 메이크업" icon="💄">
              <OptionRow label="볼터치"><Btn active={opts.blush} onClick={()=>toggleOpt("blush")}>볼터치</Btn></OptionRow>
              <OptionRow label="립 농도">{LIP_DENSITY.map(v=><Btn key={v} active={opts.lipDensity===v} onClick={()=>setOpt("lipDensity",opts.lipDensity===v?"":v)}>{v}</Btn>)}</OptionRow>
              <OptionRow label="립 색깔">{LIP_COLORS.map(v=><Btn key={v} active={opts.lipColor===v} onClick={()=>setOpt("lipColor",opts.lipColor===v?"":v)}>{v}</Btn>)}</OptionRow>
              <OptionRow label="눈썹"><Btn active={opts.eyebrow} onClick={()=>toggleOpt("eyebrow")}>눈썹 그리기</Btn></OptionRow>
              <OptionRow label="염색">{HAIR_COLORS.map(v=><Btn key={v} active={opts.hairColor===v} onClick={()=>setOpt("hairColor",opts.hairColor===v?"":v)}>{v}</Btn>)}</OptionRow>
              <OptionRow label="머리숱 채우기"><Btn active={opts.hairFill} onClick={()=>toggleOpt("hairFill")}>머리숱 채우기</Btn></OptionRow>
            </Section>
            <Section title="추가 옵션" icon="✨">
              <OptionRow label="안경">{["착용","미착용"].map(v=><Btn key={v} active={opts.glasses===v} onClick={()=>setOpt("glasses",v)}>{v}</Btn>)}</OptionRow>
              {opts.glasses==="착용"&&<>
                <OptionRow label="안경 색깔">{GLASSES_COLORS.map(v=><Btn key={v} active={opts.glassesColor===v} onClick={()=>setOpt("glassesColor",v)}>{v}</Btn>)}</OptionRow>
                <OptionRow label="안경 종류">{GLASSES_TYPES.map(v=><Btn key={v} active={opts.glassesType===v} onClick={()=>setOpt("glassesType",v)}>{v}</Btn>)}</OptionRow>
              </>}
              <OptionRow label="이마 보이기"><Btn active={opts.foreheadShow} onClick={()=>toggleOpt("foreheadShow")}>이마 보이기</Btn></OptionRow>
            </Section>
          </div>
        </div>

        <div style={{ marginTop:16 }}>
          {genError&&<p style={{ color:"#f87171", fontSize:12, textAlign:"center", marginBottom:8 }}>{genError}</p>}
          {user.credits<1
            ? <div style={{ textAlign:"center" }}>
                <p style={{ color:"#f87171", fontSize:13, marginBottom:10 }}>크레딧이 부족합니다</p>
                <button onClick={()=>setShowPayment(true)} style={{ ...btnPrimary, width:"auto", padding:"10px 32px" }}>💳 크레딧 충전하기</button>
              </div>
            : <button onClick={generateImage} style={{ ...btnPrimary, background:"linear-gradient(90deg,#b45309,#f59e0b)", fontSize:15, padding:"14px" }}>
                📷 사진 제작하기 (크레딧 1 사용)
              </button>
          }
        </div>
      </div>

      {showPayment&&(
        <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.7)", display:"flex", alignItems:"center", justifyContent:"center", padding:16, zIndex:50 }}>
          <div style={{ background:"#2d1f0e", border:"1px solid rgba(255,255,255,0.1)", borderRadius:20, padding:24, width:"100%", maxWidth:360 }}>
            <h3 style={{ color:"#fcd34d", fontWeight:600, marginTop:0 }}>💳 크레딧 충전</h3>
            <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
              {PACKAGES.map(pkg=>(
                <button key={pkg.id} onClick={()=>alert("토스페이먼츠 연동 후 이용 가능합니다.")} style={{ display:"flex", justifyContent:"space-between", padding:"12px 16px", borderRadius:12, background:"rgba(255,255,255,0.04)", border:"1px solid rgba(255,255,255,0.1)", color:"#fff", cursor:"pointer" }}>
                  <div><p style={{ margin:0, fontWeight:500 }}>{pkg.label}</p><p style={{ margin:0, fontSize:11, color:"rgba(255,255,255,0.4)" }}>+{pkg.credits} 크레딧</p></div>
                  <span style={{ color:"#fcd34d", fontWeight:600 }}>₩{pkg.price.toLocaleString()}</span>
                </button>
              ))}
            </div>
            <button onClick={()=>setShowPayment(false)} style={{ width:"100%", marginTop:10, padding:"8px 0", background:"none", border:"none", color:"rgba(255,255,255,0.4)", cursor:"pointer" }}>취소</button>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
